<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de login</title>
    <link rel="stylesheet" href="../css/login.css">
    <script src="../script/login.js"></script>
</head>

<body>
    <header>
        <img src="../imagens/iconeDoChatIF.png">
        <h2>ChatIFRN</h2>
    </header>

    <main>
        <div class="container">

            <div class="welcome-box">
                <h1>Bem-vindo ao ChatIFRN</h1>
                <p>A Plataforma de Bate-papo para estudantes do IFRN</p>
            </div>

            <div class="login-box">
                <h2>Login</h2>

                <form onsubmit="fazerLogin(event)">
                    <input type="text" id="usuario" placeholder="Usuário">
                    <input type="password" id="senha" placeholder="Senha">

                    <button type="submit">Entrar</button>
                </form>
            </div>

        </div>
    </main>

    <footer>

        <div class="footer-left">
            <img src="../imagens/ifrn.png">
        </div>

        <div class="footer-center">
            <p><strong>Trabalho de Programação para Internet</strong></p>
            <p>Prof. Marcelo Figueiredo Barbosa Júnior</p>
        </div>

        <div class="footer-right">
            <h3>Referencias:</h3>
            <a href="https://stackoverflow.com/">StackOverflow</a>
            <a href="https://developer.mozilla.org/pt-BR/docs/Web/API/Window/sessionStorage">Session Storage</a>
            <a href="https://github.com/">GitHub</a>
        </div>

    </footer>
</body>

</html>
