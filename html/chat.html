<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina do chat</title>
    <link rel="stylesheet" href="../css/chat.css">
    <script src="../script/chat.js"></script>
</head>

<body>

    <header class="header">
        <img src="../imagens/iconeDoChatIF.png">
        <h2>ChatIFRN</h2>
    </header>

    <div class="container" id="app">

        <aside class="menu">
            <h2>Chats</h2>

            <button onclick="abrirChat('geral')">Geral</button>
            <button onclick="abrirChat('informatica')">Informática</button>
            <button onclick="abrirChat('msi')">MSI</button>
            <button onclick="abrirChat('mecanica')">Mecânica</button>
            <button onclick="abrirChat('refrigeracao')">Refrigeração</button>
            <hr>

            <button onclick="irParaDevs()">Desenvolvedores</button>
            <button onclick="sair()">Sair</button>
        </aside>

        <main class="chat-area">
            <div id="chatTitle">Selecione um chat</div>
            <div id="chatBox"></div>

            <form class="input-area" onsubmit="enviarMensagem(event)">
                <input id="msg" placeholder="Mensagem...">
                <button type="submit">Enviar</button>
            </form>
        </main>

    </div>

    <footer class="footer">

        <div class="footer-left">
            <img src="../imagens/ifrn.png">
        </div>

        <div class="footer-center">
            <p><strong>Trabalho de Programação para Internet</strong></p>
            <p>Prof. Marcelo Figueiredo Barbosa Júnior</p>
        </div>

        <div class="footer-right">
            <h3>Referencias:</h3>
            <a href="https://stackoverflow.com/">StackOverflow</a>
            <a href="https://developer.mozilla.org/pt-BR/docs/Web/API/Window/sessionStorage">Session Storage</a>
            <a href="https://github.com/">GitHub</a>
        </div>

    </footer>

</body>

</html>
